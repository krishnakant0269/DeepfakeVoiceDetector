version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: echocheck-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: echocheck
    networks:
      - echocheck-network

  # Python AI Service
  ai-service:
    build: 
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: echocheck-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service:/app
      - ai-models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongodb
    networks:
      - echocheck-network

  # Node.js Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: echocheck-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/echocheck
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      - mongodb
      - ai-service
    networks:
      - echocheck-network

  # React Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: echocheck-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - echocheck-network

volumes:
  mongo-data:
    driver: local
  ai-models:
    driver: local
  uploads:
    driver: local

networks:
  echocheck-network:
    driver: bridge